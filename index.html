<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Registration</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .form-group {
      flex: 1;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background: #5563c1;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }

    .success {
      color: green;
      text-align: center;
      margin-top: 10px;
    }

    .toggle-pass {
      cursor: pointer;
      font-size: 12px;
      color: #667eea;
      float: right;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Create Account</h2>
  <form id="form">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" id="phone">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password">
        <span class="toggle-pass" onclick="togglePassword('password')">Show</span>
      </div>

      <div class="form-group">
        <label>Confirm</label>
        <input type="password" id="confirmPassword">
        <span class="toggle-pass" onclick="togglePassword('confirmPassword')">Show</span>
      </div>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="terms">
      <label>I agree to Terms & Conditions</label>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <button type="submit">Register</button>

  </form>
</div>

<script>
const form = document.getElementById("form");
const error = document.getElementById("error");
const success = document.getElementById("success");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  error.textContent = "";
  success.textContent = "";

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const gender = document.getElementById("gender").value;
  const terms = document.getElementById("terms").checked;

  if (!name || !email || !phone || !password || !confirmPassword || !gender) {
    error.textContent = "Please fill all fields!";
    return;
  }

  if (!/^\d{10}$/.test(phone)) {
    error.textContent = "Phone must be 10 digits!";
    return;
  }

  if (password.length < 6) {
    error.textContent = "Password must be at least 6 characters!";
    return;
  }

  if (password !== confirmPassword) {
    error.textContent = "Passwords do not match!";
    return;
  }

  if (!terms) {
    error.textContent = "You must accept Terms & Conditions!";
    return;
  }

  success.textContent = "Registration Successful 🎉";
  form.reset();
});

function togglePassword(id) {
  const field = document.getElementById(id);
  field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
